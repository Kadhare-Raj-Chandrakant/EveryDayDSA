# GitHubGreenCard — Daily DSA Auto-Solve Pipeline
# Runs every day at a random time within your chosen windows:
#   Window 1: 00:00-03:00 UTC (midnight-3am)
#   Window 2: 06:00-12:00 UTC (6am-noon)
# Picks one window at random each day.
# Commit author = the user who triggered the run.

name: Daily DSA Solve

on:
  schedule:
    # Run at midnight UTC every day — the random sleep shifts it into the window
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no git push)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  solve:
    runs-on: ubuntu-latest
    # Max delay (12h) + pipeline (~3 min) + buffer
    timeout-minutes: 780

    steps:
      - name: Randomize start time
        run: |
          python -c "
import random, time
window = random.randint(0, 1)
if window == 0:
    delay = random.randint(0, 10800)    # 0-3h  (midnight-3am UTC)
else:
    delay = random.randint(21600, 43200) # 6-12h (6am-noon UTC)
print(f'Window {window}: sleeping {delay}s ({delay//3600}h {delay%3600//60}m)')
time.sleep(delay)
"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git (use triggering user's identity)
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Run pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
        run: python -m src.main
